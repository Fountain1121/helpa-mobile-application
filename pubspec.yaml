name: Helpa
description: "Helpa - On-demand services marketplace for Accra, Ghana."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase core ──────────────────────────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # ── Image handling ─────────────────────────────────────────────────────────
  image_picker: ^1.1.2           # Camera & gallery access (ID upload)

  # ── State management ───────────────────────────────────────────────────────
  provider: ^6.1.2               # Lightweight state management across screens

  # ── Routing ────────────────────────────────────────────────────────────────
  go_router: ^14.2.7             # Declarative routing with deep-link support

  # ── Payments ───────────────────────────────────────────────────────────────
  webview_flutter: ^4.10.0       # Paystack hosted payment page via WebView
  http: ^1.2.2                   # HTTP client for Paystack REST API calls

  # ── Local notifications ────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2   # Show FCM alerts when app is in foreground

  # ── Shared preferences / local storage ────────────────────────────────────
  shared_preferences: ^2.3.2     # Persist small values (onboarding seen, etc.)

  # ── Location & maps ────────────────────────────────────────────────────────
  geolocator: ^13.0.2            # Get device GPS coordinates
  geocoding: ^3.0.0              # Convert coordinates ↔ human addresses
  flutter_map: ^7.0.2            # Lightweight OSM map widget (no billing key needed)
  latlong2: ^0.9.1               # LatLng type used by flutter_map

  # ── UI helpers ─────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1   # Cache Firebase Storage images with placeholders
  shimmer: ^3.0.0                # Loading skeleton animations
  timeago: ^3.6.1                # "2 minutes ago" relative timestamps
  intl: ^0.18.0                  # Date/number formatting (GHS currency, dates)
  flutter_svg: ^2.0.10+1         # SVG asset rendering
  pinput: ^5.0.0                 # OTP / PIN input field (future phone verification)
  dotted_border: ^2.1.0          # Dashed border for the ID upload drop zone

  # ── Misc ───────────────────────────────────────────────────────────────────
  uuid: ^4.5.1                   # Generate unique IDs client-side where needed
  url_launcher: ^6.3.1           # Open phone dialer, WhatsApp, browser links
  permission_handler: ^11.3.1    # Runtime permissions (camera, location, notifs)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # assets:   ← uncomment and add folders here when you have actual assets
  #   - assets/images/
  #   - assets/icons/

  # Uncomment and add your font files under assets/fonts/ when ready
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Inter-ExtraBold.ttf
  #         weight: 800
  #       - asset: assets/fonts/Inter-Black.ttf
  #         weight: 900